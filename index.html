<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="main.js" defer></script>
    <style>
        * {
            background: rgb(57, 235, 220);
            overflow: hidden;
        }

        #canvas {
            position: absolute;
            top: 50.125%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50%; 
            aspect-ratio: 16 / 9;
            background: rgba(183, 1, 255, 0);
            image-rendering: pixelated;
        }
        #frame {
            position: absolute;
            top: 50%;
            left: 55%;
            transform: translate(-50%, -50%);
            width: 150%;
            height: 150%;
            background:  url('./assets/background.png') no-repeat;
            image-rendering: pixelated;
            background-position: center;
            background-size: 100%;
        }
    </style>
</head>
<body>
    <div id="frame">
        <canvas id="canvas"></canvas>
    </div><!-- <p>test</p> -->
    
</body>
</html>
